<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPCX — Live Telemetry</title>
<meta name="description" content="Live SPCX (Space Exploration Technologies Corp.) stock tracker. Updated every ~5 minutes.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@100;200;300;400;600&family=Saira+Condensed:wght@400;600&family=IBM+Plex+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#04060A;
    --panel:#0A0F16;
    --panel2:#0D131C;
    --line:#182029;
    --ink:#F2F5F8;
    --mut:#66727F;
    --dim:#3A434E;
    --up:#2FD98A;
    --down:#FF4D42;
    --glow:#9FD8FF;
    --mono:"IBM Plex Mono",Consolas,monospace;
    --sans:"Saira",system-ui,sans-serif;
    --cond:"Saira Condensed","Saira",sans-serif;
  }
  *{box-sizing:border-box}
  html{background:var(--void)}
  body{
    margin:0;min-height:100svh;color:var(--ink);
    font-family:var(--sans);font-weight:300;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #sky{position:fixed;inset:0;z-index:-1}

  .wrap{max-width:1120px;margin:0 auto;padding:0 clamp(16px,4vw,40px)}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;
    padding:26px 0 0;
  }
  .wordmark{
    font-weight:600;font-size:26px;letter-spacing:.42em;text-indent:.1em;
  }
  .corpname{
    font-family:var(--cond);font-size:12px;letter-spacing:.24em;color:var(--mut);
    text-transform:uppercase;
  }
  .topright{margin-left:auto;display:flex;align-items:center;gap:14px}
  .mstate{
    display:flex;align-items:center;gap:8px;
    font-family:var(--cond);font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--mut);border:1px solid var(--line);border-radius:999px;
    padding:6px 14px;
  }
  .mstate i{width:7px;height:7px;border-radius:50%;background:var(--dim);flex:none}
  .mstate.open i{background:var(--up);box-shadow:0 0 8px var(--up);animation:pulse 2s infinite}
  .mstate.ext i{background:#E8B34B;box-shadow:0 0 8px #E8B34B}
  @keyframes pulse{50%{opacity:.4}}
  .updated{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em}

  /* ---------- hero ---------- */
  .hero{padding:clamp(40px,8vh,90px) 0 30px}
  .eyebrow{
    font-family:var(--cond);font-size:13px;letter-spacing:.4em;text-transform:uppercase;
    color:var(--mut);margin-bottom:14px;
  }
  .eyebrow b{color:var(--glow);font-weight:400}
  .pricerow{display:flex;align-items:flex-end;gap:26px;flex-wrap:wrap}
  .price{
    font-family:var(--mono);font-weight:200;
    font-size:clamp(64px,13vw,150px);line-height:.9;
    font-variant-numeric:tabular-nums;letter-spacing:-.02em;
    text-shadow:0 0 80px rgba(159,216,255,.18);
  }
  .price .cur{font-size:.35em;font-weight:300;color:var(--mut);vertical-align:top;margin-right:.15em}
  .price .cents{font-size:.5em;font-weight:200;color:var(--mut)}
  .deltas{display:flex;flex-direction:column;gap:8px;padding-bottom:10px}
  .pill{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:clamp(14px,2vw,19px);font-weight:400;
    font-variant-numeric:tabular-nums;
    padding:7px 14px;border-radius:4px;width:max-content;
  }
  .pill.up{color:var(--up);background:rgba(47,217,138,.08);border:1px solid rgba(47,217,138,.25)}
  .pill.down{color:var(--down);background:rgba(255,77,66,.08);border:1px solid rgba(255,77,66,.25)}
  .pill small{font-family:var(--cond);font-size:.68em;letter-spacing:.2em;color:var(--mut);font-weight:400}

  .statusline{
    display:flex;align-items:center;gap:12px;margin-top:26px;
    font-family:var(--cond);font-size:14px;letter-spacing:.34em;text-transform:uppercase;
  }
  .statusline .lab{color:var(--dim)}
  .statusline .val{color:var(--ink)}
  .statusline .val.bad{color:var(--down)}
  .statusline svg{width:22px;height:22px;transition:transform .8s cubic-bezier(.2,.8,.3,1)}

  /* ---------- chart ---------- */
  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:8px;
    padding:18px 18px 10px;margin-top:10px;
    box-shadow:0 30px 80px -40px rgba(0,0,0,.9);
  }
  .chart-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .chart-title{font-family:var(--cond);font-size:12px;letter-spacing:.3em;color:var(--mut);text-transform:uppercase}
  .ranges{margin-left:auto;display:flex;gap:4px}
  .ranges button{
    font-family:var(--cond);font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--mut);background:none;border:1px solid transparent;border-radius:4px;
    padding:5px 12px;cursor:pointer;
  }
  .ranges button:hover{color:var(--ink)}
  .ranges button:focus-visible{outline:1px solid var(--glow);outline-offset:2px}
  .ranges button.on{color:var(--ink);border-color:var(--line);background:rgba(159,216,255,.05)}
  #chart{display:block;width:100%;height:clamp(260px,42vh,420px);cursor:crosshair;touch-action:pan-y}
  .readout{
    min-height:20px;font-family:var(--mono);font-size:12px;color:var(--mut);
    padding:6px 4px 4px;font-variant-numeric:tabular-nums;letter-spacing:.03em;
  }

  /* ---------- stats ---------- */
  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;
    overflow:hidden;margin:26px 0 60px;
  }
  .stat{background:var(--panel);padding:16px 18px}
  .stat .lab{
    font-family:var(--cond);font-size:11px;letter-spacing:.26em;color:var(--mut);
    text-transform:uppercase;margin-bottom:7px;white-space:nowrap;
  }
  .stat .val{
    font-family:var(--mono);font-size:17px;font-weight:400;
    font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .stat .val.up{color:var(--up)} .stat .val.down{color:var(--down)}

  footer{
    padding:0 0 44px;
    font-family:var(--cond);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--dim);display:flex;gap:8px;flex-wrap:wrap;
  }
  footer a{color:var(--mut);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--ink)}

  #err{
    display:none;margin:20px 0;padding:14px 18px;border:1px solid rgba(255,77,66,.4);
    border-radius:6px;color:var(--down);font-family:var(--mono);font-size:13px;
  }
  @media (prefers-reduced-motion:reduce){
    .mstate.open i{animation:none}
    .statusline svg{transition:none}
  }
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>

<div class="wrap">
  <div class="topbar">
    <span class="wordmark">SPCX</span>
    <span class="corpname">Space Exploration Technologies Corp. · Nasdaq</span>
    <span class="topright">
      <span class="mstate" id="mstate"><i></i><span id="mstateTxt">—</span></span>
      <span class="updated" id="updated"></span>
    </span>
  </div>

  <div id="err" role="alert"></div>

  <section class="hero">
    <div class="eyebrow">Live telemetry <b>//</b> common stock <b>//</b> USD</div>
    <div class="pricerow">
      <div class="price" id="price" aria-live="polite"><span class="cur">$</span>—</div>
      <div class="deltas">
        <span class="pill" id="dayPill"><small>Today</small><span>—</span></span>
        <span class="pill" id="ipoPill"><small>Since IPO</small><span>—</span></span>
      </div>
    </div>
    <div class="statusline">
      <svg id="ship" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2c2.4 2.2 3.6 5.2 3.6 8.6 0 2.5-.6 4.9-1.7 6.9h-3.8a14.6 14.6 0 0 1-1.7-6.9C8.4 7.2 9.6 4.2 12 2Z" fill="#F2F5F8"/>
        <path d="M8.6 12.5 5.9 16l2.6.9M15.4 12.5 18.1 16l-2.6.9" stroke="#66727F" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M10.6 18.4h2.8l-.7 3.2h-1.4l-.7-3.2Z" fill="#9FD8FF"/>
      </svg>
      <span class="lab">Vehicle status</span>
      <span class="val" id="statusTxt">ACQUIRING SIGNAL</span>
    </div>
  </section>

  <div class="card">
    <div class="chart-head">
      <span class="chart-title">Trajectory</span>
      <span class="ranges" role="tablist" aria-label="Chart range">
        <button data-r="1D" class="on">1D</button><button data-r="5D">5D</button><button data-r="1M">1M</button><button data-r="ALL">All</button>
      </span>
    </div>
    <canvas id="chart"></canvas>
    <div class="readout" id="readout"></div>
  </div>

  <div class="stats" id="stats"></div>

  <footer>
    <span>Data via Yahoo Finance · refreshed every ~5 min by GitHub Actions</span>
    <span>·</span><span>Not investment advice</span>
    <span>·</span><span>T-minus everything</span>
  </footer>
</div>

<script>
(function(){
"use strict";
/* ================= starfield ================= */
var sky=document.getElementById("sky"),sx=sky.getContext("2d");
var reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
var stars=[];
function skySize(){
  var d=Math.min(devicePixelRatio||1,2);
  sky.width=innerWidth*d;sky.height=innerHeight*d;
  sx.setTransform(d,0,0,d,0,0);
  stars=[];
  var n=Math.floor(innerWidth*innerHeight/6500);
  for(var i=0;i<n;i++)stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.2+.2,p:Math.random()*6.28,s:.3+Math.random()*.7});
}
addEventListener("resize",skySize);skySize();
function skyFrame(t){
  sx.clearRect(0,0,innerWidth,innerHeight);
  var g=sx.createLinearGradient(0,0,0,innerHeight);
  g.addColorStop(0,"#04060A");g.addColorStop(.75,"#060A11");g.addColorStop(1,"#0A1520");
  sx.fillStyle=g;sx.fillRect(0,0,innerWidth,innerHeight);
  var lg=sx.createRadialGradient(innerWidth/2,innerHeight+340,120,innerWidth/2,innerHeight+340,640);
  lg.addColorStop(0,"rgba(159,216,255,.10)");lg.addColorStop(1,"rgba(159,216,255,0)");
  sx.fillStyle=lg;sx.fillRect(0,innerHeight-320,innerWidth,320);
  sx.fillStyle="#F2F5F8";
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    sx.globalAlpha=reduced?.45*s.s:(0.25+0.45*Math.abs(Math.sin(t/1600*s.s+s.p)))*s.s;
    sx.beginPath();sx.arc(s.x,s.y,s.r,0,6.28);sx.fill();
  }
  sx.globalAlpha=1;
  if(!reduced)requestAnimationFrame(skyFrame);
}
requestAnimationFrame(skyFrame);

/* ================= data ================= */
var D=null,range="1D";
var $=function(id){return document.getElementById(id)};
var fmt=function(n,dp){return n==null?"—":n.toLocaleString("en-US",{minimumFractionDigits:dp==null?2:dp,maximumFractionDigits:dp==null?2:dp})};
function fmtVol(v){
  if(v==null)return "—";
  if(v>=1e9)return (v/1e9).toFixed(2)+"B";
  if(v>=1e6)return (v/1e6).toFixed(1)+"M";
  if(v>=1e3)return (v/1e3).toFixed(0)+"K";
  return ""+v;
}
function load(){
  return fetch("data/history.json?ts="+Date.now(),{cache:"no-store"})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()})
    .then(function(j){D=j;$("err").style.display="none";render()})
    .catch(function(e){
      var el=$("err");el.style.display="block";
      el.textContent="TELEMETRY LOST — could not load price data ("+e.message+"). Retrying automatically.";
    });
}

/* latest session = intraday points sharing the exchange-local date of the last point */
function sessions(n){
  var off=D.meta.gmtoffset||0,rows=D.intraday,out=[],cur=[],lastDay=null;
  for(var i=0;i<rows.length;i++){
    var day=Math.floor((rows[i][0]+off)/86400);
    if(day!==lastDay){if(cur.length)out.push(cur);cur=[];lastDay=day;}
    cur.push(rows[i]);
  }
  if(cur.length)out.push(cur);
  return out.slice(-n);
}
function seriesFor(r){
  if(r==="1D")return {pts:sessions(1).flat(),ref:D.meta.previousClose,t:"intraday"};
  if(r==="5D")return {pts:sessions(5).flat(),ref:null,t:"intraday"};
  if(r==="1M")return {pts:D.intraday,ref:null,t:"intraday"};
  return {pts:D.daily.map(function(c){return [c[0],c[4],c[5]]}),ref:null,t:"daily"};
}

/* ================= render ================= */
function render(){
  var m=D.meta,last=D.intraday[D.intraday.length-1],price=m.price!=null?m.price:last[1];
  var ip=Math.floor(price),cents=Math.round((price-ip)*100);
  $("price").innerHTML='<span class="cur">$</span>'+ip.toLocaleString("en-US")+'.<span class="cents">'+String(cents).padStart(2,"0")+'</span>';
  document.title="SPCX $"+fmt(price)+(price>=m.previousClose?" ▲":" ▼");

  pill($("dayPill"),"Today",price-m.previousClose,(price-m.previousClose)/m.previousClose*100);
  var ipoOpen=D.daily[0][1];
  pill($("ipoPill"),"Since IPO",price-ipoOpen,(price-ipoOpen)/ipoOpen*100);

  var dayPct=(price-m.previousClose)/m.previousClose*100;
  var st,bad=false;
  if(dayPct>=3)st="FULL THRUST";
  else if(dayPct>=0)st="NOMINAL ASCENT";
  else if(dayPct>-3)st="TRAJECTORY ANOMALY";
  else{st="RAPID UNSCHEDULED DEPRECIATION";bad=true;}
  var sEl=$("statusTxt");sEl.textContent=st;sEl.className="val"+(bad?" bad":"");
  $("ship").style.transform="rotate("+Math.max(-135,Math.min(0,-45-dayPct*18))+"deg)";

  marketState();
  var up=new Date(D.updated*1000);
  $("updated").textContent="SYNC "+up.toLocaleTimeString("en-US",{hour12:false});

  stats(price);
  drawChart();
}
function pill(el,label,abs,pct){
  var up=abs>=0;
  el.className="pill "+(up?"up":"down");
  el.innerHTML="<small>"+label+"</small><span>"+(up?"+":"−")+fmt(Math.abs(abs))+" ("+(up?"+":"−")+Math.abs(pct).toFixed(2)+"%)</span>";
}
function marketState(){
  var tp=D.meta.tradingPeriods,now=Math.floor(Date.now()/1000),el=$("mstate"),tx=$("mstateTxt");
  el.className="mstate";
  if(!tp){tx.textContent="UNKNOWN";return}
  if(now>=tp.regular.start&&now<tp.regular.end){el.classList.add("open");tx.textContent="Market open"}
  else if(now>=tp.pre.start&&now<tp.pre.end){el.classList.add("ext");tx.textContent="Pre-market"}
  else if(now>=tp.post.start&&now<tp.post.end){el.classList.add("ext");tx.textContent="After hours"}
  else tx.textContent="Market closed";
}
function stats(price){
  var m=D.meta,d=D.daily,ath=0,athD=null;
  for(var i=0;i<d.length;i++)if(d[i][2]!=null&&d[i][2]>ath){ath=d[i][2];athD=d[i][0]}
  var ipoDate=new Date(d[0][0]*1000);
  var rows=[
    ["Open",  "$"+fmt(d[d.length-1][1])],
    ["Prev close","$"+fmt(m.previousClose)],
    ["Day range","$"+fmt(m.dayLow)+" – $"+fmt(m.dayHigh)],
    ["Volume",fmtVol(m.volume)],
    ["52W range","$"+fmt(m.fiftyTwoWeekLow)+" – $"+fmt(m.fiftyTwoWeekHigh)],
    ["All-time high","$"+fmt(ath)+(athD?" · "+new Date(athD*1000).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"")],
    ["IPO",ipoDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})],
    ["Off ATH",(function(){var p=(price-ath)/ath*100;return '<span class="val '+(p>=0?"up":"down")+'">'+(p>=0?"+":"−")+Math.abs(p).toFixed(1)+"%</span>"})()]
  ];
  $("stats").innerHTML=rows.map(function(r){
    var v=/^<span/.test(r[1])?r[1]:'<div class="val">'+r[1]+"</div>";
    return '<div class="stat"><div class="lab">'+r[0]+"</div>"+v+"</div>";
  }).join("");
}

/* ================= chart ================= */
var cv=$("chart"),cx=cv.getContext("2d"),hover=null;
function drawChart(){
  if(!D)return;
  var dpr=Math.min(devicePixelRatio||1,2);
  var w=cv.clientWidth,h=cv.clientHeight;
  if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr}
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.clearRect(0,0,w,h);

  var s=seriesFor(range),pts=s.pts;
  if(pts.length<2)return;
  var padL=8,padR=64,padT=16,padB=26;
  var iw=w-padL-padR,ih=h-padT-padB;

  var lo=Infinity,hi=-Infinity,i;
  for(i=0;i<pts.length;i++){var v=pts[i][1];if(v<lo)lo=v;if(v>hi)hi=v}
  if(s.ref!=null){lo=Math.min(lo,s.ref);hi=Math.max(hi,s.ref)}
  var span=(hi-lo)||1;lo-=span*.07;hi+=span*.07;span=hi-lo;

  var X=function(i){return padL+i/(pts.length-1)*iw};
  var Y=function(v){return padT+(1-(v-lo)/span)*ih};

  /* grid + y labels */
  cx.font="11px 'IBM Plex Mono',monospace";cx.textAlign="left";cx.textBaseline="middle";
  var step=niceStep(span/4);
  for(var gv=Math.ceil(lo/step)*step;gv<hi;gv+=step){
    var gy=Y(gv);
    cx.strokeStyle="rgba(24,32,41,.9)";cx.lineWidth=1;
    cx.beginPath();cx.moveTo(padL,gy);cx.lineTo(w-padR+14,gy);cx.stroke();
    cx.fillStyle="#66727F";cx.fillText("$"+fmt(gv,step<1?2:step<10?1:0),w-padR+20,gy);
  }
  /* x labels */
  cx.fillStyle="#3A434E";cx.textAlign="center";cx.textBaseline="top";
  var nLab=Math.min(6,Math.floor(iw/110)+2);
  for(i=0;i<nLab;i++){
    var idx=Math.round(i*(pts.length-1)/(nLab-1));
    cx.fillText(xLabel(pts[idx][0]),Math.max(padL+26,Math.min(X(idx),w-padR-26)),h-padB+8);
  }

  var ref=s.ref!=null?s.ref:pts[0][1];
  var lastV=pts[pts.length-1][1];
  var up=lastV>=ref;
  var col=up?"#2FD98A":"#FF4D42";

  /* reference line */
  cx.strokeStyle="rgba(159,216,255,.35)";cx.setLineDash([4,5]);cx.lineWidth=1;
  cx.beginPath();cx.moveTo(padL,Y(ref));cx.lineTo(w-padR+14,Y(ref));cx.stroke();
  cx.setLineDash([]);

  /* area fill */
  var fg=cx.createLinearGradient(0,padT,0,h-padB);
  fg.addColorStop(0,up?"rgba(47,217,138,.22)":"rgba(255,77,66,.22)");
  fg.addColorStop(1,"rgba(0,0,0,0)");
  cx.beginPath();cx.moveTo(X(0),Y(pts[0][1]));
  for(i=1;i<pts.length;i++)cx.lineTo(X(i),Y(pts[i][1]));
  cx.lineTo(X(pts.length-1),h-padB);cx.lineTo(X(0),h-padB);cx.closePath();
  cx.fillStyle=fg;cx.fill();

  /* line with glow */
  cx.shadowColor=col;cx.shadowBlur=12;
  cx.strokeStyle=col;cx.lineWidth=1.8;cx.lineJoin="round";
  cx.beginPath();cx.moveTo(X(0),Y(pts[0][1]));
  for(i=1;i<pts.length;i++)cx.lineTo(X(i),Y(pts[i][1]));
  cx.stroke();cx.shadowBlur=0;

  /* endpoint */
  cx.fillStyle=col;
  cx.beginPath();cx.arc(X(pts.length-1),Y(lastV),3.4,0,6.28);cx.fill();
  cx.globalAlpha=.25;
  cx.beginPath();cx.arc(X(pts.length-1),Y(lastV),9,0,6.28);cx.fill();
  cx.globalAlpha=1;

  /* crosshair */
  var ro=$("readout");
  if(hover!=null){
    var hi2=Math.max(0,Math.min(pts.length-1,Math.round((hover-padL)/iw*(pts.length-1))));
    var hx=X(hi2),hp=pts[hi2];
    cx.strokeStyle="rgba(242,245,248,.25)";cx.lineWidth=1;
    cx.beginPath();cx.moveTo(hx,padT);cx.lineTo(hx,h-padB);cx.stroke();
    cx.fillStyle="#F2F5F8";
    cx.beginPath();cx.arc(hx,Y(hp[1]),3,0,6.28);cx.fill();
    var dd=new Date(hp[0]*1000);
    ro.textContent=dd.toLocaleDateString("en-US",{month:"short",day:"numeric"})
      +(s.t==="intraday"?" "+dd.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false}):"")
      +"  ·  $"+fmt(hp[1])
      +(hp[2]?"  ·  vol "+fmtVol(hp[2]):"");
  }else{
    ro.textContent=range==="1D"?"dashed line = previous close":"";
  }
}
function niceStep(raw){
  var mag=Math.pow(10,Math.floor(Math.log10(raw)));
  var n=raw/mag;
  return (n<1.5?1:n<3.5?2:n<7.5?5:10)*mag;
}
function xLabel(ts){
  var d=new Date(ts*1000);
  if(range==="1D")return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
  if(range==="5D")return d.toLocaleDateString("en-US",{weekday:"short"});
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

cv.addEventListener("pointerleave",function(){hover=null;drawChart()});

  });
});
