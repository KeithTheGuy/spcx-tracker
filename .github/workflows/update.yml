name: Update SPCX price

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes, the fastest GitHub allows
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: price-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest SPCX data
        run: node scripts/fetch.mjs

      - name: Commit if the price moved
        run: |
          if git diff --quiet -- data/history.json; then
            echo "No new data; skipping commit."
            exit 0
          fi
          git config user.name "spcx-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json
          git commit -m "price: $(node -p "JSON.parse(require('fs').readFileSync('data/history.json')).meta.price")"
          git push
